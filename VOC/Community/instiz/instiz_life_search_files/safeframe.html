body,div,dl,dt,dd,ul,ol,li,h1,h2,h3,h4,h5,h6,pre,code,form,fieldset,legend,textarea,p,blockquote,th,td,input,select,button{margin:0;padding:0}

body{background:#fff}
body,th,td,input,select,textarea,button{font-size:14px;line-height:1.5;font-family:system-ui,-apple-system,AppleSDGothicNeo-Regular,Helvetica,'Malgun Gothic','맑은 고딕',sans-serif;color:#333}

a:active,a:hover{text-decoration:none}
address,caption,cite,code,dfn,em,var{font-style:normal;font-weight:400}
.ir_pm{display:block;overflow:hidden;font-size:1px;line-height:0;color:transparent}
.screen_out{overflow:hidden;position:absolute;width:0;height:0;line-height:0;text-indent:-9999px}
.show{display:block}
.hide{display:none}

.cm_ad{position:relative;min-width:320px;height:100px;background-color:#F8FAFB;text-align:left;letter-spacing:0;box-sizing:border-box;word-break:break-all} /* 2021-05-20 수정 */
.cm_ad .link_thumb{overflow:hidden;position:absolute;left:20px;top:13px;bottom:13px;max-width:74px;max-height:74px;vertical-align:top} /* 2021-05-20 수정 */
.cm_ad .link_thumb .img_thumb{width:100%;height:100%;vertical-align:top}
.cm_ad .link_thumb .frame_g{position:absolute;left:0;top:0;right:0;bottom:0;border:1px solid rgba(0,0,0,.05)}
.cm_ad .link_ad{display:block;height:100%;padding:16px 0;box-sizing:border-box;word-break:break-all}
.cm_ad .link_ad .area_ad{overflow:hidden;position:absolute;top:50%;left:109px;right:20px;min-height:74px;margin-top:0px;-webkit-transform: translate(0,-50%);transform: translate(0, -50%)} /* 2021-05-20 수정 */
.cm_ad .tit_ad{display:block;overflow:hidden;margin-top:3px;margin-right:19px;font-weight:700;font-size:16px;line-height:22px;color:#000;white-space:nowrap;text-overflow:ellipsis} /* 2021-05-20 수정 */
.cm_ad .desc_ad{display:-webkit-box;overflow:hidden;max-height:36px;padding-top:4px;font-size:14px;line-height:19px;color:#333;-webkit-box-orient:vertical;box-orient:vertical;-webkit-line-clamp:2;line-clamp:2} /* 2021-05-20 수정 */

/*admark*/
.cm_ad .icon_ad{overflow:hidden;position:absolute;right:0;top:0;width:33px;height:24px;font-size:0px}
.cm_ad .icon_ad .img_mark{display:block;width:25px;height:16px;margin:4px auto;background:url(https://t1.daumcdn.net/biz/ui/ad/ico_adlogo2.png) no-repeat 0 0;background-size:25px 16px}

/*imark*/
.cm_ad .icon_ad.imark{overflow:hidden;position:absolute;right:0;top:0;width:22px;height:22px;font-size:0px}
.cm_ad .imark .img_mark{display:block;width:14px;height:14px;margin:4px auto;background:url(https://t1.daumcdn.net/biz/ui/ad/ADmark/i_mark_200803.png) no-repeat 0 0;background-size:14px 14px}

/* 심의필 */
.ad_info{display:inline-block;padding:1px 0;line-height:16px;font-size:8px;color:#919191;font-weight:normal;vertical-align:top} /* 2021-05-20 수정 */

/*android 분기*/
.os_android .cm_ad .tit_ad,
.os_windows .cm_ad .tit_ad{margin-top:4px;letter-spacing:-0.5px}
