function writeReply(prts_reply_id){
	if( !parentCheckLoginAndRedirect() )
		return;

	if(isUploading) {
		alert("이미지 업로드 중입니다.");
		return false;
	}

	if ( !checkReplyRealnameConfirm(20052) ) {
		return;
	}

	if ( !parentCheckUseAgree() ) {
		return;
	}

	if (!canWriteReply) {
		alert('작성자가 지정한 참여 대상만 댓글을 작성할 수 있습니다.');
		return;
	}

	var content 	= j$('#content').val();
	var connect_mhp = j$('#connect_mhp:checked').val();
	var nickName 	= j$('#nickName').val();
	var imgfileTmp 	= j$('#imgfile_tmp').val();
	var imgOldUrl 	= j$('#imgOldUrl').val();
	var fid	 		= j$('#fid').val();
	var fname		= j$('#fname').attr('value');
	var fsize		= j$('#fsize').attr('value');
	var knto		= j$('#knto').val();

	if(j$.trim(nickName).length == 0) {
		alert('닉네임을 입력해 주세요.');
		j$('#nickName').focus();
		return;
	}
	if (j$.trim(nickName) == '날게씨') {
		alert("날게씨(운영자용) 사용할 수 없습니다.\n다시 입력해주세요.");
		j$("#nickName").focus();
		return;
	}
	var chckMsg  = new RegExp(DEFAULT_COMMENT_MSG);

	//댓글 empty 여부 확인
	if (j$.trim(content).length == 0 || content.match(chckMsg) ){
		alert("내용을 입력하여 주세요.");
		j$('#content').focus();
		return;
	}

	if ( content.match(/<img/i) != null ) {
		alert("광고 및 악성 댓글로 인해 'Ctrl+V, 붙여넣기'시 일부내용이 노출되지 않을 수 있습니다.\n이미지는 상단 첨부 기능을 이용하세요.");
	}

	j$.ajax({
		type: 'POST',
		url: '/talk/reply/write',
		data: {
			pann_id   : pann_id,
			content  : content,
			hp_chk : connect_mhp,
			nickname : nickName,
			prts_reply_id : prts_reply_id,
			img_file_tmp : imgfileTmp,
			img_old_url : imgOldUrl,
			fid	: fid,
			fname : fname,
			fsize : fsize,
			knto: knto
		}
	}).done(function(json){
		if ( json.resultCd == 0 )
		{
			if (prts_reply_id == -1) {
				parent.loadReply(1, '', 'W');
				parent.initTab();
			} else {
				parent.loadSubreply(1, prts_reply_id);
			}
		}
		else if ( json.resultCd == '1' ){
			alert(json.msg);
		}
		else if ( json.resultCd == '14' ){
			alert(json.msg);
		}
		else if ( json.resultCd == 2 ){
			alert('중복된 댓글입니다.');
		}
		else if ( json.resultCd == 3 ){
			alert(json.msg);
		}
		else if ( json.resultCd == 6 ){
			alert('유효한 데이터가 없습니다.');
		}
		else if ( json.resultCd == 8 ){
			alert("현재 회원님은 글쓰기 기능이 제한되어 서비스를 이용하실 수 없는 상태 입니다.\n원활한 서비스 운영을 위한 부득이한 조치임을 양해하여 주시기 바랍니다.");
		}
		else if ( json.resultCd == 9 ){
			alert('제한된 사용자입니다.');
		}
		else if ( json.resultCd == 10 ){
			alert('이상패턴이 감지되어 서비스 이용이 제한되었습니다.');
		}
		else if ( json.resultCd == '12' ){
			alert('이상패턴이 감지되어 서비스 이용이 제한되었습니다.');
		}
		else if ( json.resultCd == '21' ){
			alert("회원님께서 접속한 IP는 운영자에 의해 차단이 되어 글쓰기 기능이 제한되었습니다.\n원활한 서비스 운영을 위한 부득이한 조치임을 양해하여 주시기 바랍니다.");
		}
		else if ( json.resultCd == '22' ){
			alert("닉네임은 한글,영문,숫자만 입력 가능합니다. \n다시 입력해주세요.");
		}
		else if ( json.resultCd == '26' ){
			alert("날게씨(운영자용) 사용할 수 없습니다.\n다시 입력해주세요.");
		}
		else if ( json.resultCd == '52' ){
			alert('여성만 댓글 쓰기가 가능한 카테고리입니다.');
		}
		else if ( json.resultCd == '53' ){
			alert('남성만 댓글 쓰기가 가능한 카테고리입니다.');
		}
		else if ( json.resultCd == '13') {
			if (confirm("성별 정보가 없는 회원입니다.\n성별 정보를 입력하시겠습니까?")) {

		else{
			alert('오류가 발생하였습니다.');

}

function genderApiPopup() {
	var parentUrl = 'http://pann.nate.com/talk/'+pann_id+'#commentBox';

			alert(e.data);  
			window.location.reload();
		}
	} 			
}


function stripHTMLtag(string) {
	var objStrip = new RegExp();
	objStrip = /[<][^>]*[>]/gi;
	return string.replace(objStrip, "");
}

function ResizeIFrame() {
	if(parent && self.name && !window.opener) {
		var tmp = "";
		if(arguments.length == 1 || !window.ie) tmp = ",true";
		setTimeout("parent.ResizeFrame('"+ self.name +"'"+ tmp +")", 50);
	}
}

function setDefaultHeight(height) {
	var frame = j$('#content').height();
	var default_height = height || 300;
	if (frame < default_height) {
		j$('#content').height(default_height);
	} else{
		j$('#content').height(50);
	}
}

function hideFontSize() {
	j$('#fontSizeSet').hide();

}

function fontNameSet(){
	j$('#fontNameSet').toggle();

function fontSizeSet(){

function changeStyle(editcase, data){
	if(data==''){
		alert("접근경로 오류입니다");
		return;
	}
	var fname = j$("#fname").attr("value");
	var fsize = j$("#fsize").attr("value");

	switch (editcase){
		case 'font' :
			fname = data;
			j$("#fname").attr("value",fname);
			j$("#fsize").attr("value",fsize);
			break;
		case 'font_size' :
			fsize = data;
			j$("#fsize").attr("value",fsize);
			j$("#fname").attr("value",fname);
			break;
		default:
			alert("접근경로 오류입니다");
			return;
	}

	saveText = j$('#content').val();
	if (fname == "-1") fname = "맑은 고딕";
	textStyle = "font-size:"+fsize+"pt;font-family:'"+fname+"'; height:300px";
	j$('#content').attr('style',textStyle);
	j$('#content').val('').val(saveText);

	hideFontSize();

	j$('#content').focus();
}

function focusCmtContent(content){
	hideFontSize();
	if (j$(content).val() == DEFAULT_COMMENT_MSG) {
		j$(content).val('');
	}
}

var ImageApp = {
	enable: function() {
		j$("#formUpload a.imgadd").unbind().click( function() { j$("#imgfile").click() });
	},
	disable: function() {
		j$("#formUpload a.imgadd").unbind().click( function() { alert("댓글에서 첨부파일은 1개까지 등록 가능합니다."); return false; });
	},
	addImg: function(obj) {
		j$('#formUpload')[0].reset();
		j$('#imgfile_tmp').val(obj.tempUrl);
		j$('#imgOldUrl').val(obj.fileName);
		j$('#fid').val(obj.fileId);
		
		j$('#itemImgPreview').html('<img src="https://thumb.pann.com/tc_100x70/'
				+ obj.tempUrl + '" ondragstart="return false;" width="100" height="70" alt="" />');
		j$('#itemImgNm').html(ImageApp.fileName(obj.fileName, 25));
		j$('#itemImgSize').html(ImageApp.fileSize(obj.fileSize));
		
		j$('#previewBox').show();
		j$('#formUpload').hide();
		ImageApp.disable();
		ResizeIFrame();
	},
	delImg: function() {
		j$('#imgfile_tmp').val('');
		j$('#imgOldUrl').val('');
		j$('#fid').val('');
		
		j$('#previewBox').hide();
		j$('#formUpload').show();
		ImageApp.enable();
		ResizeIFrame();
	},
	fileSize: function(bytes) {
		var sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
		if (bytes == 0) {
			return '0 Bytes';
		}
		var idx = parseInt(Math.floor(Math.log(bytes) / Math.log(1024)));
		if (idx == 0) {
			return bytes + ' ' + sizes[idx];
		}
		return (bytes / Math.pow(1024, idx)).toFixed(1) + ' ' + sizes[idx];
	},
	fileName: function(fileName, offset) {
		try {
			if(fileName.length > offset){
				fileName = fileName.substr(0, offset) + '...';
			}
		} catch(e) { }
		return fileName;
	}
};
